<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMO Sepet Hesapla — İnokas CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <script src="/dmo/js/dmo-core.js"></script>
  <script src="/dmo/js/dmo-sepet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dmo/css/core.css">
  <link rel="stylesheet" href="/dmo/css/layout.css">
  <link rel="stylesheet" href="/dmo/css/sepet-hesapla.css">
  <link rel="stylesheet" href="/nav.css?v=nav-slide-4-gutter">
</head>

<body>

  <nav class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand">
        <div class="brand-dot"></div>
        İnokas <span>CRM</span>
      </a>
    </div>
    <div class="topbar-right">
      <div class="nav-cluster">
        <span class="nav-pill" id="navPill" aria-hidden="true"></span>
        <div class="nav-links-row" role="navigation" aria-label="Ana menü">
          <a href="/" class="nav-link" data-nav-id="faturalar">Faturalar</a>
          <a href="/stok.html" class="nav-link" data-nav-id="stok">Stok</a>
          <a href="/dmo/" class="nav-link active" data-nav-id="dmo">DMO</a>
        </div>
      </div>
      <button type="button" class="nav-link nav-link--logout logout">Çıkış</button>
    </div>
  </nav>

  <main class="main-container" style="padding:0; height:calc(100vh - 56px); display:grid; grid-template-columns:1.2fr 0.8fr; overflow:hidden;">

    <!-- LEFT: Product Grid -->
    <div style="padding:24px; overflow-y:auto; background:#f8fafc; border-right:1px solid #e2e8f0; display:flex; flex-direction:column;">

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div style="display:flex; align-items:center; gap:12px;">
          <a href="/dmo/"
            style="display:flex; align-items:center; gap:6px; background:white; border:1px solid #e2e8f0; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; color:#475569; text-decoration:none;">
            ← Geri
          </a>
          <h2 style="font-size:1.1rem; font-weight:800; color:#0f172a; margin:0;">⚡ DMO Sepet Hesapla</h2>
        </div>


        <!-- Rates display -->
        <div style="display:flex; gap:8px; margin-bottom:16px;">
            <div style="flex:1; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:10px 14px; text-align:center;">
                <div style="font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase;">USD/TRY</div>
                <div id="hh_rate_usd" style="font-size:15px; font-weight:800; color:#0f172a;">—</div>
            </div>
            <div style="flex:1; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:10px 14px; text-align:center;">
                <div style="font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase;">EUR/TRY</div>
                <div id="hh_rate_eur" style="font-size:15px; font-weight:800; color:#0f172a;">—</div>
            </div>
            <div style="flex:1; background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:10px 14px; text-align:center;">
                <div style="font-size:10px; font-weight:700; color:#2563eb; text-transform:uppercase;">DMO EUR</div>
                <div id="hh_rate_dmo" style="font-size:15px; font-weight:800; color:#2563eb;">—</div>
            </div>
        </div>

        <button type="button" id="hhUpdateBtn" onclick="updateHHPrices()"
          style="background:#eff6ff; border:1px solid #bfdbfe; color:#2563eb; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer;">
          🔄 Fiyatları Güncelle
        </button>
      </div>

      <!-- Tabs -->
      <div style="display:flex; gap:0; margin-bottom:12px; border-bottom:1px solid #e2e8f0;">
        <button id="hh_tab_urunler" onclick="switchHHTab('urunler')"
          style="padding:8px 16px; background:none; border:none; border-bottom:2px solid #2563eb; font-size:13px; font-weight:800; color:#2563eb; cursor:pointer; transition:all 0.15s;">
          Ürünler
        </button>
        <button id="hh_tab_sepet" onclick="switchHHTab('sepet')"
          style="padding:8px 16px; background:none; border:none; border-bottom:2px solid transparent; font-size:13px; font-weight:500; color:#64748b; cursor:pointer; transition:all 0.15s;">
          Sepet<span id="hh_tab_sepet_count"></span>
        </button>
      </div>

      <!-- Search -->
      <input type="text" id="hh_search" oninput="filterHHProducts()"
        placeholder="🔍 Ürün ara..."
        style="width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:16px; font-size:13px; outline:none; box-sizing:border-box; background:white;">

      <!-- Product cards grid -->
      <div id="hh_product_grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px;">
        <!-- populated by JS -->
      </div>

    </div>

    <!-- RIGHT: Calculations -->
    <div style="padding:24px; overflow-y:auto; display:flex; flex-direction:column; background:white;">

      <h3 style="font-size:1rem; font-weight:800; color:#0f172a; margin-bottom:16px;">📊 Hesaplama</h3>

      <!-- Customer -->
      <div class="form-group" style="margin-bottom:16px;">
        <label>Müşteri Adı</label>
        <input type="text" id="hh_customer_name" placeholder="Müşteri...">
      </div>

      <!-- Limit tracker -->
      <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:14px; margin-bottom:16px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <span style="font-size:12px; font-weight:700; color:#0f172a;">📊 3.000.000 ₺ Limit</span>
          <span id="hh_limit_text" style="font-size:12px; font-weight:700; color:#2563eb;">%0</span>
        </div>
        <div style="background:#e2e8f0; border-radius:99px; height:6px; overflow:hidden;">
          <div id="hh_limit_bar" style="height:100%; background:#2563eb; border-radius:99px; width:0%; transition:width 0.3s;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:5px;">
          <span style="font-size:11px; color:#64748b;">Kullanılan: <strong id="hh_limit_used">0 ₺</strong></span>
          <span style="font-size:11px; color:#64748b;">Kalan: <strong id="hh_limit_remaining">3.000.000 ₺</strong></span>
        </div>
      </div>

      <!-- Calculations grid -->
      <div style="display:grid; grid-template-columns:1fr 1fr; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden; margin-bottom:16px;">

        <!-- Header -->
        <div style="background:#f8fafc; padding:10px 16px; font-size:11px; font-weight:800; color:#64748b; letter-spacing:0.5px; border-bottom:1px solid #e2e8f0;">GELİR TARAFI</div>
        <div style="background:#f8fafc; padding:10px 16px; font-size:11px; font-weight:800; color:#64748b; letter-spacing:0.5px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0;">GİDER TARAFI</div>

        <!-- DMO Tutar / İnokas Maliyet -->
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">DMO Tutar</label>
          <input type="number" id="hh_dmo_basket" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">İnokas Maliyet</label>
          <input type="number" id="hh_inokas_basket" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- KDV / DMO Kesinti -->
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">KDV (%20)</label>
          <input type="number" id="hh_kdv" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">DMO Kesinti (%8)</label>
          <input type="number" id="hh_dmo_deduction" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Tevkifat + Gerçek KDV / Risturn -->
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; display:flex; flex-direction:column; gap:4px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:11px; font-weight:600; color:#94a3b8;">Tevkifat</label>
            <input type="number" id="hh_tevkifat" readonly style="border:none; text-align:right; font-weight:600; font-size:12px; color:#64748b; background:transparent; width:80px;">
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:12px; font-weight:700; color:#0f172a;">Gerçek KDV</label>
            <input type="number" id="hh_gercek_kdv" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:80px;">
          </div>
        </div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">Risturn (%1)</label>
          <input type="number" id="hh_risturn" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Damga -->
        <div style="border-bottom:1px solid #e2e8f0; background:#fafafa;"></div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">Damga + Karar</label>
          <input type="number" id="hh_damga_karar" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Hediye -->
        <div style="border-bottom:1px solid #e2e8f0; background:#fafafa;"></div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">🎁 Hediye Toplam</label>
          <input type="number" id="hh_gift_total" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Toplam İndirim -->
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; background:#fcfcfc;"></div>
        <div style="padding:10px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:12px; font-weight:600; color:#64748b;">Toplam İndirim</label>
          <input type="number" id="hh_discount_total" readonly style="border:none; text-align:right; font-weight:700; font-size:13px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Toplam Gelir / Gider -->
        <div style="padding:12px 16px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; background:#f1f5f9;">
          <label style="font-size:12px; font-weight:800; color:#0f172a;">Toplam Gelir</label>
          <input type="text" id="hh_toplam_gelir" value="0,00" readonly style="border:none; text-align:right; font-weight:800; font-size:14px; color:#0f172a; background:transparent; width:100px;">
        </div>
        <div style="padding:12px 16px; border-bottom:1px solid #e2e8f0; border-left:2px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; background:#f1f5f9;">
          <label style="font-size:12px; font-weight:800; color:#0f172a;">Toplam Gider</label>
          <input type="text" id="hh_toplam_gider" value="0,00" readonly style="border:none; text-align:right; font-weight:800; font-size:14px; color:#0f172a; background:transparent; width:100px;">
        </div>

        <!-- Net Kar -->
        <div style="grid-column:span 2; padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:16px; background:#f8fafc;">
          <div style="border:1px solid #e2e8f0; border-radius:10px; padding:12px 16px; background:white; display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:12px; font-weight:800; color:#0f172a;">Net Kar</label>
            <div id="hh_net_profit" style="font-size:16px; font-weight:800; color:#10b981;">0,00 ₺</div>
          </div>
          <div style="border:1px solid #e2e8f0; border-radius:10px; padding:12px 16px; background:white; display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:12px; font-weight:800; color:#0f172a;">Kar %</label>
            <div id="hh_profit_pct" style="font-size:16px; font-weight:800; color:#10b981;">%0</div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div style="display:flex; gap:10px; margin-top:auto; padding-top:16px; border-top:1px solid #e2e8f0;">
        <button type="button" class="btn btn-primary" style="flex:1;" onclick="saveHizliHesapAsTaslak()">
          💾 Taslak Kaydet
        </button>
      </div>

    </div>

  </main>

  <div id="toast-container"></div>
  <script src="/nav-pill.js?v=nav-slide-3-ease"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // Check if opened for editing an existing taslak
      const taslakId = new URLSearchParams(window.location.search).get("taslak");
      if (taslakId) {
        await openHizliHesapForTaslak(taslakId);
      } else {
        await loadHHData();
      }

      // After saving taslak, redirect to siparisler
      window._onTaslakSaved = () => {
        window.location.href = "/dmo/pages/siparisler.html";
      };
    });
  </script>

</body>

</html>
