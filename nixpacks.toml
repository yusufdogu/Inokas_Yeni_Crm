[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "stdenv.cc.cc.lib", "chromium", "nss", "freetype", "harfbuzz", "liberation_ttf"]

[phases.install]
cmds = ["PUPPETEER_SKIP_DOWNLOAD=true npm ci", "pip install -r requirements.txt --break-system-packages"]

[variables]
LD_LIBRARY_PATH = "${stdenv.cc.cc.lib}/lib"

[start]
cmd = "which chromium || which chromium-browser || find /nix -name chromium -type f 2>/dev/null | head -5; node index.js"