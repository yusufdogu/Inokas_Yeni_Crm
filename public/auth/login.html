<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İnokas CRM — Giriş</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
<div class="auth-split">

  <!-- Left -->
  <div class="auth-left">
    <div class="auth-left-inner">

      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-text">KUMANDA</div>
      </div>

      <div class="auth-title">Tekrar hoş geldiniz</div>
      <div class="auth-sub">Hesabınıza giriş yapın</div>

      <div id="alertBox" class="alert alert-error"></div>

      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="ornek@mail.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="loginBtn" onclick="handleLogin()" style="margin-top:8px;">
        Giriş Yap →
      </button>

      <div class="auth-link" style="margin-top:20px;">
        Hesabınız yok mu? <a href="/auth/signup.html">Kayıt olun</a>
      </div>

    </div>
  </div>

  <!-- Right -->
  <div class="auth-right">
    <img src="/assests/kumanda2.gif" alt="Kumanda">
    <div class="auth-right-quote">
      <div class="quote-text">Veriye dayalı kararlar,<br>başarıya giden yol.</div>
      <div class="quote-author">İnokas CRM — Kumanda</div>
    </div>
  </div>

</div>

<script>
  if (sessionStorage.getItem('inokas_token')) window.location.href = '/';
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const alertEl  = document.getElementById('alertBox');
    const btn      = document.getElementById('loginBtn');

    alertEl.classList.remove('show');

    if (!email || !password) return showError('E-posta ve şifre zorunlu.');

    btn.textContent = 'Giriş yapılıyor...';
    btn.classList.add('loading');

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || 'Giriş başarısız.');

      sessionStorage.setItem('inokas_token', data.token);
      sessionStorage.setItem('onboarding_complete', data.onboarding_complete);

      btn.textContent = '✓ Giriş yapıldı';

      if (!data.onboarding_complete) {
        setTimeout(() => window.location.replace('/auth/onboarding.html'), 600);
      } else {
        setTimeout(() => window.location.replace('/chat'), 600);
      }

    } catch (err) {
      showError(err.message);
      btn.textContent = 'Giriş Yap →';
      btn.classList.remove('loading');
      document.getElementById('password').value = '';
    }
  }

  function showError(msg) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
