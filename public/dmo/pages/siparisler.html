<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siparişler — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('login_auth_token')) window.location.href = '/auth/login.html';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/shared/supabase-client.js"></script>
  <script src="/dmo/js/dmo-core.js"></script>
  <script src="/dmo/js/dmo-siparisler.js"></script>
  <script src="/dmo/js/dmo-analytics.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/dmo/css/core.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/dmo/css/siparisler.css">
  <link rel="stylesheet" href="/dmo/css/analytics.css">
</head>

<body>
<div class="app-shell">

  <div id="sidebar-container"></div>

  <div class="page-area">

    <!-- Header -->
    <div class="page-header" style="background:#0f172a; border-bottom:1px solid #1e293b;">
      <div class="page-header-left">
        <button class="sb-toggle-btn" onclick="toggleSidebar()" style="color:#94a3b8; --hover-bg:rgba(255,255,255,0.06);">
          <i class="ti ti-menu-2"></i>
        </button>
        <div>
          <p style="font-size:15px; font-weight:700; color:#f1f5f9; margin:0;">Siparişler</p>
          <p style="font-size:11px; color:#475569; margin:0;" id="sp-order-count">Yükleniyor...</p>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <!-- Filters -->
    <div style="padding:10px 20px; background:#111827; border-bottom:1px solid #1e293b; flex-shrink:0;">

      <!-- TOP ROW -->
      <div style="display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; margin-bottom:8px;">

        <!-- Company tags -->
        <div style="flex:2; min-width:180px;">
          <div id="companyTagsWrap" class="filter-tags-wrap" onclick="document.getElementById('mainSearch').focus()">
            <div id="companyTags" class="filter-tags"></div>
            <input type="text" id="mainSearch" onkeyup="handleMainSearch()" onkeydown="handleTagKeydown(event,'company')"
              placeholder="Firma ekle..." autocomplete="off"
              style="border:none; outline:none; background:transparent; font-size:12px; color:#f1f5f9; min-width:100px; flex:1; padding:2px 4px; font-family:inherit;">
            <div id="companyDropdown" class="filter-dropdown"></div>
          </div>
        </div>

        <!-- Product tags -->
        <div style="flex:2; min-width:180px;">
          <div id="productTagsWrap" class="filter-tags-wrap" onclick="document.getElementById('filterProduct').focus()">
            <div id="productTags" class="filter-tags"></div>
            <input type="text" id="filterProduct" onkeyup="handleProductSearch()" onkeydown="handleTagKeydown(event,'product')"
              placeholder="Ürün ekle..." autocomplete="off"
              style="border:none; outline:none; background:transparent; font-size:12px; color:#f1f5f9; min-width:100px; flex:1; padding:2px 4px; font-family:inherit;">
            <div id="productDropdown" class="filter-dropdown"></div>
          </div>
        </div>

        <!-- Date range -->
        <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
          <input type="date" id="filterDateStart"
            style="padding:5px 8px; height:32px; border:1px solid #334155; border-radius:7px; font-size:12px; outline:none; font-family:inherit; box-sizing:border-box; background:#1e293b; color:#f1f5f9;">
          <span style="color:#475569; font-size:12px;">—</span>
          <input type="date" id="filterDateEnd"
            style="padding:5px 8px; height:32px; border:1px solid #334155; border-radius:7px; font-size:12px; outline:none; font-family:inherit; box-sizing:border-box; background:#1e293b; color:#f1f5f9;">
        </div>

        <!-- Basket range -->
        <div style="flex-shrink:0; min-width:180px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:3px;">
            <span style="font-size:10px; color:#64748b;">Sepet Aralığı</span>
            <span id="basketRangeLabel" style="font-size:10px; color:#94a3b8;">0 — 3.000.000 ₺</span>
          </div>
          <div style="display:flex; align-items:center; gap:6px;">
            <input type="range" id="basketMin" min="0" max="3000000" step="50000" value="0"
              oninput="updateBasketRange()"
              style="flex:1; height:4px; accent-color:#2563eb;">
            <input type="range" id="basketMax" min="0" max="3000000" step="50000" value="3000000"
              oninput="updateBasketRange()"
              style="flex:1; height:4px; accent-color:#2563eb;">
          </div>
        </div>

        <!-- Buttons -->
        <div style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
          <button onclick="applyFilters()"
            style="height:32px; padding:0 14px; background:#2563eb; color:white; border:none; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:4px;">
            <i class="ti ti-filter" style="font-size:13px;"></i>Uygula
          </button>
          <button onclick="clearAllFilters()" title="Temizle"
            style="height:32px; width:32px; display:flex; align-items:center; justify-content:center; border:1px solid #334155; border-radius:7px; background:transparent; cursor:pointer; color:#64748b; flex-shrink:0;">
            <i class="ti ti-trash" style="font-size:14px;"></i>
          </button>
        </div>

      </div>

      <!-- ADVANCED FILTERS TOGGLE -->
      <button id="advancedFiltersBtn" onclick="toggleAdvancedFilters()"
        style="background:none; border:none; font-size:12px; font-weight:600; color:#2563eb; cursor:pointer; padding:0; display:flex; align-items:center; gap:4px; font-family:inherit;">
        <span id="advancedFiltersBtnText">
          <i class="ti ti-chevron-down" style="font-size:12px;"></i> Gelişmiş Filtreler
        </span>
        <span id="advancedFiltersBadge" style="display:none; background:#2563eb; color:white; border-radius:99px; padding:1px 7px; font-size:11px; font-weight:700;">!</span>
      </button>

      <!-- ADVANCED PANEL -->
      <div id="advancedFiltersPanel" style="display:none; margin-top:10px; padding-top:10px; border-top:1px solid #1e293b;">
        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">

          <select id="filterStatus" onchange="updateAdvancedBadge()"
            style="flex:1; min-width:130px; padding:6px 10px; height:32px; border:1px solid #334155; border-radius:7px; font-size:12px; outline:none; font-family:inherit; background:#1e293b; color:#f1f5f9;">
            <option value="">Tüm Durumlar</option>
            <option value="Taslak">Taslak</option>
            <option value="Sipariş Alındı">Sipariş Alındı</option>
            <option value="Tamamlandı">Tamamlandı</option>
            <option value="İptal">İptal</option>
          </select>

          <select id="filterCategory" onchange="updateAdvancedBadge()"
            style="flex:1; min-width:130px; padding:6px 10px; height:32px; border:1px solid #334155; border-radius:7px; font-size:12px; outline:none; font-family:inherit; background:#1e293b; color:#f1f5f9;">
            <option value="">Tüm Kategoriler</option>
            <option value="KARTUŞ">Kartuş</option>
            <option value="YAZICI">Yazıcı</option>
            <option value="TARAYICI">Tarayıcı</option>
          </select>

          <!-- Brand multiselect -->
          <div style="flex:2; min-width:180px;">
            <div id="brandTagsWrap" class="filter-tags-wrap" onclick="document.getElementById('brandSearch').focus()">
              <div id="brandTags" class="filter-tags"></div>
              <input type="text" id="brandSearch" oninput="handleBrandSearch()" onkeydown="handleTagKeydown(event,'brand')"
                placeholder="Marka ekle..." autocomplete="off"
                style="border:none; outline:none; background:transparent; font-size:12px; color:#f1f5f9; min-width:80px; flex:1; padding:2px 4px; font-family:inherit;">
              <div id="brandDropdown" class="filter-dropdown"></div>
            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- Content -->
    <div class="page-content-split">

      <!-- KPIs -->
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:14px 20px; flex-shrink:0;">
        <div style="background:white; border:1px solid #e2e8f0; border-radius:10px; padding:10px 16px;">
          <p style="margin:0 0 4px; font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Toplam Sipariş</p>
          <p style="margin:0; font-size:20px; font-weight:700; color:#0f172a;" id="kpi-total">—</p>
        </div>
        <div style="background:white; border:1px solid #e2e8f0; border-radius:10px; padding:10px 16px;">
          <p style="margin:0 0 4px; font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Toplam DMO Tutar</p>
          <p style="margin:0; font-size:20px; font-weight:700; color:#0f172a;" id="kpi-amount">—</p>
        </div>
        <div style="background:white; border:1px solid #e2e8f0; border-radius:10px; padding:10px 16px;">
          <p style="margin:0 0 4px; font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Toplam Kâr</p>
          <p style="margin:0; font-size:20px; font-weight:700; color:#16a34a;" id="kpi-profit">—</p>
        </div>
      </div>

      <!-- Table — takes all remaining space, scrolls internally -->
      <div style="flex:1; overflow-y:auto; padding:0 20px 12px; min-height:0;">
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead>
            <tr style="border-bottom:1px solid #e2e8f0;">
              <th style="padding:8px 12px 8px 0; text-align:left; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap;">Sipariş No</th>
              <th style="padding:8px 12px 8px 0; text-align:left; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em;">Firma</th>
              <th style="padding:8px 12px 8px 0; text-align:left; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap;">Tarih</th>
              <th style="padding:8px 12px 8px 0; text-align:left; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em;">Durum</th>
              <th style="padding:8px 0; text-align:right; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap;">DMO Tutar</th>
              <th style="padding:8px 0; text-align:right; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap;">Net Kâr</th>
            </tr>
          </thead>
          <tbody id="sp-tbody"></tbody>
        </table>
        <p id="sp-empty" style="display:none; text-align:center; color:#94a3b8; padding:40px 0; font-size:13px;">Sipariş bulunamadı</p>
      </div>

      <!-- Analiz bar + Charts — pinned to bottom, never scrolls away -->
      <div style="flex-shrink:0;">

        <!-- Analiz bar -->
        <div onclick="toggleAnaliz()"
          style="padding:10px 20px; background:white; border-top:1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none;">
          <div style="display:flex; align-items:center; gap:8px; color:#64748b;">
            <i class="ti ti-chart-bar" style="font-size:16px;"></i>
            <span style="font-size:13px; font-weight:600;">Analiz</span>
            <span id="sp-filter-hint" style="font-size:11px; color:#94a3b8;"></span>
          </div>
          <i class="ti ti-chevron-down" id="sp-chevron" style="font-size:16px; color:#94a3b8; transition:transform 0.2s;"></i>
        </div>

        <!-- Charts -->
        <div id="sp-charts-section" style="display:none; border-top:1px solid #e2e8f0; background:white; padding:16px 20px; max-height:340px; overflow-y:auto;">
          <div id="siparislerChartsGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:14px;"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<select id="filterCompany" style="display:none;"></select>
<div id="toast-container"></div>

<script src="/shared/auth-interceptor.js"></script>  <!-- no defer -->
<script src="/shared/sidebar.js" defer></script>      <!-- defer is fine -->
<script>
  let _analizOpen = false;

  function toggleAnaliz() {
    _analizOpen = !_analizOpen;
    document.getElementById('sp-charts-section').style.display = _analizOpen ? 'block' : 'none';
    document.getElementById('sp-chevron').style.transform      = _analizOpen ? 'rotate(180deg)' : 'rotate(0)';
    if (_analizOpen) loadCharts(window._lastFilteredOrders || []);
  }
</script>

</body>
</html>
