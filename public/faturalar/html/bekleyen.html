<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekleyen Faturalar — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/login.html';
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../../faturalar.css?v=20260511-ekle-card">
  <link rel="stylesheet" href="../../sidebar.css?v=3">
  <link rel="stylesheet" href="../css/bekleyen.css?v=1">
  <script src="../../sidebar.js?v=3" defer></script>
</head>

<body>

<div class="app-shell">
  <div id="sidebar-container"></div>
  <div class="page-area">

    <div class="bek-page" style="display:flex;">

      <div class="fat-page-header">
        <button class="sb-toggle-btn" onclick="toggleSidebar()" title="Menüyü aç/kapat"><i class="ti ti-menu-2"></i></button>
        <p class="fat-page-title">Bekleyen Faturalar</p>
      </div>

      <div class="bek-page-tabbar">
        <button class="bek-page-tab bek-page-tab--active" id="bekPageTab1" onclick="switchBekPageTab('list')">Bekleyen Faturalar</button>
        <button class="bek-page-tab" id="bekPageTab2" onclick="switchBekPageTab('bulk')">Toplu Fatura Ekle</button>
      </div>

      <!-- Pane 1: Liste + detay -->
      <div id="bekListPane" class="bek-list-pane">
        <div class="bek-toolbar">
          <input type="text" id="bekSearch" placeholder="Fatura no veya firma ara..." class="fatura-filter-input" style="width:220px;" oninput="renderBekleyenList()">
          <div class="bek-dir-toggle">
            <button class="bek-dir-btn bek-dir-btn--active" id="bekDirGelen" onclick="setBekDir('gelen')">Gelen</button>
            <button class="bek-dir-btn"                     id="bekDirGiden" onclick="setBekDir('giden')">Giden</button>
          </div>
          <span id="bekCount" class="bek-count"></span>
          <button class="bek-refresh-btn" onclick="loadBekleyenInvoices()" title="Yenile">↺</button>
        </div>

        <div class="bek-main">
          <div class="bek-list-panel">
            <div class="bek-card-list" id="bekTbody"></div>
          </div>
          <div id="bekDetailPanel" style="display:none; flex:1; flex-direction:column; overflow:hidden;"></div>
        </div>
      </div>

      <!-- Pane 2: Toplu fatura ekle -->
      <div id="bekBulkPane" style="display:none; flex-direction:column; flex:1; overflow-y:auto; padding:20px 24px;">
        <div class="bek-bulk-lead">
          <p class="bulk-modal-lead">Birden fazla UBL-XML seçin. Dosyalar İnokas VKN'sine göre <strong>Gelen</strong> / <strong>Giden</strong> sütunlarına ayrılır. Yükleme sonrası faturalar <strong>Bekleyen Faturalar</strong> sekmesine düşer.</p>
          <div class="bulk-file-pick">
            <input type="file" id="bulkFileInput" accept=".xml" multiple hidden onchange="handleBulkFilePick(event)">
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('bulkFileInput').click()">XML dosyalarını seç</button>
            <span class="bulk-file-hint">Ctrl/Cmd ile çoklu seçim</span>
          </div>
        </div>
        <div class="bulk-two-cols" style="margin-top:16px;">
          <div class="bulk-col bulk-col--incoming">
            <div class="bulk-col-head">
              <h3>Gelen</h3>
              <div class="bulk-col-tools">
                <label class="bulk-mini"><input type="checkbox" id="bulkSelAllIn" onchange="bulkSelectAllInColumn('in', this.checked)"> Tümü</label>
                <button type="button" class="btn btn-secondary btn-sm" onclick="bulkDeleteSelectedInColumn('in')">Seçilenleri sil</button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="clearBulkColumn('in')">Temizle</button>
              </div>
            </div>
            <div id="bulkIncomingBody" class="bulk-col-body"></div>
          </div>
          <div class="bulk-col bulk-col--outgoing">
            <div class="bulk-col-head">
              <h3>Giden</h3>
              <div class="bulk-col-tools">
                <label class="bulk-mini"><input type="checkbox" id="bulkSelAllOut" onchange="bulkSelectAllInColumn('out', this.checked)"> Tümü</label>
                <button type="button" class="btn btn-secondary btn-sm" onclick="bulkDeleteSelectedInColumn('out')">Seçilenleri sil</button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="clearBulkColumn('out')">Temizle</button>
              </div>
            </div>
            <div id="bulkOutgoingBody" class="bulk-col-body"></div>
          </div>
        </div>
        <div id="bulkFailedBox" class="bulk-failed-box"></div>
        <div class="bek-bulk-footer">
          <button type="button" class="btn btn-primary" onclick="executeBulkUpload()">Bekleyenlere Yükle</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="../js/utils.js?v=1"></script>
<script src="../js/xml.js?v=1"></script>
<script src="../js/state.js?v=20260511-detailpage"></script>
<script src="../js/api.js?v=1"></script>
<script src="../js/detail.js?v=20260511-embedded-pdf"></script>
<script src="../js/bekleyen.js?v=1"></script>

</body>
</html>
