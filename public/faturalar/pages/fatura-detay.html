<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatura Detay — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/auth/login.html';
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/shared/shared-filters.css?v=1">
  <link rel="stylesheet" href="/faturalar/css/gelen-giden.css?v=1">
  <style>
    /* Detail page specific layout */
    .detay-page {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      height: 100vh;
    }

    .detay-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }

    .detay-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .detay-back-btn:hover { background: rgba(255,255,255,0.14); color: #f1f5f9; }

    .detay-header-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .detay-invoice-no {
      font-size: 13px;
      font-weight: 800;
      color: #60a5fa;
      white-space: nowrap;
      font-family: 'Geist Mono', monospace;
    }

    .detay-company {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detay-dir-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .detay-dir-in  { background: #dcfce7; color: #15803d; }
    .detay-dir-out { background: #fee2e2; color: #b91c1c; }

    .detay-header-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .detay-split {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* PDF side */
    .detay-pdf-pane {
      border-right: 1px solid #e2e8f0;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
    }

    .detay-pdf-iframe {
      display: none;
      width: 100%;
      flex: 1;
      border: none;
    }

    .detay-pdf-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #94a3b8;
    }

    /* Info side */
    .detay-info-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    .detay-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 14px;
      gap: 10px;
    }

    .detay-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: detay-spin 0.7s linear infinite;
    }

    @keyframes detay-spin { to { transform: rotate(360deg); } }
    @keyframes pdf-spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-shell">

  <div id="sidebar-container"></div>
  <div class="page-area">
    <div class="detay-page">

      <!-- Header -->
      <div class="detay-header">
        <button class="sb-toggle-btn" onclick="toggleSidebar()">
          <i class="ti ti-menu-2"></i>
        </button>
        <button class="detay-back-btn" onclick="goBack()">
          <i class="ti ti-arrow-left" style="font-size:13px;"></i> Geri
        </button>
        <div class="detay-header-info">
          <span class="detay-invoice-no" id="headerInvoiceNo">—</span>
          <span class="detay-company" id="headerCompany">Yükleniyor...</span>
          <span class="detay-dir-badge" id="headerDirBadge"></span>
        </div>
        <div class="detay-header-actions" id="headerActions"></div>
      </div>

      <!-- Split: PDF left, Info right -->
      <div class="detay-split">

        <!-- PDF -->
        <div class="detay-pdf-pane">
          <iframe id="detayPdfIframe" class="detay-pdf-iframe"></iframe>
          <div id="detayPdfEmpty" class="detay-pdf-empty">
            <svg width="48" height="48" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p style="font-size:13px; font-weight:600;">PDF bulunamadı</p>
          </div>
        </div>

        <!-- Info tabs -->
        <div class="detay-info-pane">
          <div id="detayLoading" class="detay-loading">
            <div class="detay-spinner"></div>
            <span>Fatura yükleniyor...</span>
          </div>

          <!-- Tab bar — hidden until loaded -->
          <div class="fat-dtab-bar" id="detayTabBar" style="display:none;">
            <button class="fat-dtab fat-dtab--active" id="tabBilgilerBtn" onclick="switchDetayTab('bilgiler')">Fatura Bilgileri</button>
            <button class="fat-dtab" id="tabUrunlerBtn" onclick="switchDetayTab('urunler')">Fatura Ürünleri</button>
          </div>
          <div class="fat-dtab-body" id="fatDetailTabBody" style="display:none;"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/faturalar/js/utils.js?v=1"></script>
<script src="/faturalar/js/xml.js?v=1"></script>
<script src="/faturalar/js/api.js?v=20260521-sort"></script>
<script src="/faturalar/js/state.js?v=20260511-detailpage"></script>

<script src="/faturalar/js/detail.js?v=20260521-batch-is-internal"></script>
<script src="/faturalar/js/fatura-detay.js?v=20260521-approve-redirect"></script>
<script src="/shared/auth-interceptor.js"></script>
<script src="/shared/sidebar.js" defer></script>
</body>
</html>
