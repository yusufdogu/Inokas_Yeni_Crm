<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatura Detay — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('login_auth_token')) window.location.href = '/auth/login.html';
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/shared/shared-filters.css?v=1">
  <link rel="stylesheet" href="/faturalar/css/gelen-giden.css?v=1">
  <link rel="stylesheet" href="/faturalar/css/faturalar.css?v=1">

  <script src="/shared/auth-interceptor.js" defer></script>
  <script src="/faturalar/js/utils.js?v=1" defer></script>
  <script src="/faturalar/js/state.js?v=20260511-detailpage" defer></script>
  <script src="/faturalar/js/api.js?v=20260521-sort" defer></script>
  <script src="/faturalar/js/xml.js?v=1" defer></script>
  <script src="/giderler/js/gider-faturalar.js" defer></script>
  <script src="/faturalar/js/detail.js?v=20260521-batch-is-internal" defer></script>
  <script src="/faturalar/js/fatura-detay.js?v=20260521-approve-redirect" defer></script>
  <script src="/shared/sidebar.js" defer></script>
</head>
<body>
<div class="app-shell">

  <div id="sidebar-container"></div>
  <div class="page-area">
    <div class="detay-page">

      <!-- Header -->
      <div class="detay-header">
        <button class="sb-toggle-btn" onclick="toggleSidebar()">
          <i class="ti ti-menu-2"></i>
        </button>
        <button class="detay-back-btn" onclick="goBack()">
          <i class="ti ti-arrow-left" style="font-size:13px;"></i> Geri
        </button>
        <div class="detay-header-info">
          <span class="detay-invoice-no" id="headerInvoiceNo">—</span>
          <span class="detay-company" id="headerCompany">Yükleniyor...</span>
          <span class="detay-dir-badge" id="headerDirBadge"></span>
        </div>
        <div class="detay-header-actions" id="headerActions"></div>
      </div>

      <!-- Split: PDF left, Info right -->
      <div class="detay-split">

        <!-- PDF -->
        <div class="detay-pdf-pane">
          <iframe id="detayPdfIframe" class="detay-pdf-iframe"></iframe>
          <div id="detayPdfEmpty" class="detay-pdf-empty">
            <svg width="48" height="48" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p style="font-size:13px; font-weight:600;">PDF bulunamadı</p>
          </div>
        </div>

        <!-- Info tabs -->
        <div class="detay-info-pane">
          <div id="detayLoading" class="detay-loading">
            <div class="detay-spinner"></div>
            <span>Fatura yükleniyor...</span>
          </div>

          <!-- Tab bar — hidden until loaded -->
          <div class="fat-dtab-bar" id="detayTabBar" style="display:none;">
            <button class="fat-dtab fat-dtab--active" id="tabBilgilerBtn" onclick="switchDetayTab('bilgiler')">Fatura Bilgileri</button>
            <button class="fat-dtab" id="tabUrunlerBtn" onclick="switchDetayTab('urunler')">Fatura Ürünleri</button>
          </div>
          <div class="fat-dtab-body" id="fatDetailTabBody" style="display:none;"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>



</body>
</html>
