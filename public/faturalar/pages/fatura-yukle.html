<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatura Yükle — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/auth/login.html';
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/faturalar/css/bekleyen.css?v=2">
  <script src="/shared/auth-interceptor.js"></script>  <!-- no defer -->
  <script src="/shared/sidebar.js" defer></script>      <!-- defer is fine --></head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>
  <div class="page-area">

    <!-- Header -->
    <div class="bek-page-header">
      <button class="sb-toggle-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
      <div>
        <p class="bek-page-title">Fatura Yükle</p>
        <p class="bek-page-sub">Toplu UBL-XML yükleme</p>
      </div>
    </div>

    <!-- Content -->
    <div style="flex:1; overflow-y:auto; padding:20px 24px;">

      <p class="bulk-modal-lead">
        Birden fazla UBL-XML seçin. Dosyalar İnokas VKN'sine göre
        <strong>Gelen</strong> / <strong>Giden</strong> sütunlarına ayrılır.
        Yükleme sonrası faturalar Bekleyen sekmesine düşer.
      </p>

      <div class="bulk-file-pick" style="margin-bottom:16px;">
        <input type="file" id="bulkFileInput" accept=".xml" multiple hidden onchange="handleBulkFilePick(event)">
        <button type="button" class="btn btn-primary"
          onclick="document.getElementById('bulkFileInput').click()"
          style="display:flex; align-items:center; gap:6px;">
          <i class="ti ti-upload" style="font-size:14px;"></i>
          XML dosyalarını seç
        </button>
        <span class="bulk-file-hint">Ctrl/Cmd ile çoklu seçim yapabilirsiniz</span>
      </div>

      <div class="bulk-two-cols">
        <div class="bulk-col">
          <div class="bulk-col-head">
            <h3>▲ Gelen</h3>
            <div class="bulk-col-tools">
              <label class="bulk-mini">
                <input type="checkbox" id="bulkSelAllIn" onchange="bulkSelectAllInColumn('in', this.checked)">
                Tümü
              </label>
              <button type="button" class="btn-xs" onclick="bulkDeleteSelectedInColumn('in')">Seçilenleri sil</button>
              <button type="button" class="btn-xs" onclick="clearBulkColumn('in')">Temizle</button>
            </div>
          </div>
          <div id="bulkIncomingBody" class="bulk-col-body"></div>
        </div>

        <div class="bulk-col">
          <div class="bulk-col-head">
            <h3>▼ Giden</h3>
            <div class="bulk-col-tools">
              <label class="bulk-mini">
                <input type="checkbox" id="bulkSelAllOut" onchange="bulkSelectAllInColumn('out', this.checked)">
                Tümü
              </label>
              <button type="button" class="btn-xs" onclick="bulkDeleteSelectedInColumn('out')">Seçilenleri sil</button>
              <button type="button" class="btn-xs" onclick="clearBulkColumn('out')">Temizle</button>
            </div>
          </div>
          <div id="bulkOutgoingBody" class="bulk-col-body"></div>
        </div>
      </div>

      <div id="bulkFailedBox" class="bulk-failed-box"></div>

      <div style="display:flex; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #e2e8f0;">
        <button type="button" class="btn btn-primary"
          onclick="executeBulkUpload()"
          style="display:flex; align-items:center; gap:6px; padding:10px 24px;">
          <i class="ti ti-cloud-upload" style="font-size:15px;"></i>
          Bekleyenlere Yükle
        </button>
      </div>

    </div>

  </div>
</div>

<script src="/faturalar/js/utils.js?v=1"></script>
<script src="/faturalar/js/xml.js?v=1"></script>
<script src="/faturalar/js/api.js?v=20260521-sort"></script>
<script src="/faturalar/js/state.js?v=20260511-detailpage"></script>
<script src="/faturalar/js/bekleyen-page.js?v=1"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderBulkLists();
  });
</script>
</body>
</html>
