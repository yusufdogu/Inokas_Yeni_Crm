<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapor — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/login.html';
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../../shared/faturalar.css?v=20260511-ekle-card">
  <link rel="stylesheet" href="../../shared/sidebar.css?v=3">
  <link rel="stylesheet" href="../css/rapor.css?v=1">
  <script src="/shared/sidebar.js"></script>
  <script src="../../sidebar.js?v=3" defer></script>
</head>

<body>

  <div class="app-shell">
    <div id="sidebar-container"></div>
    <div class="page-area">

      <div class="rapor-page" style="display:flex;">

        <div class="fat-page-header">
          <button class="sb-toggle-btn" onclick="toggleSidebar()" title="Menüyü aç/kapat"><i
              class="ti ti-menu-2"></i></button>
          <p class="fat-page-title">Rapor</p>
        </div>

        <div class="rapor-topbar">
          <div class="rapor-mode-tabs">
            <button id="rTabGelen" class="rapor-mode-tab rapor-mode-tab--active" onclick="setRaporMode('gelen')">↓ Gelen
              faturalar</button>
            <button id="rTabGiden" class="rapor-mode-tab" onclick="setRaporMode('giden')">↑ Giden faturalar</button>
            <button id="rTabOfis" class="rapor-mode-tab" onclick="setRaporMode('ofis')">Ofis İçi</button>
          </div>

          <div class="rapor-filters">
            <div id="raporCompDropWrap" class="company-dropdown-wrap" style="width:180px; min-width:140px;">
              <button type="button" id="raporCompDropBtn" class="company-dropdown-btn"
                onclick="toggleRaporCompDropdown()">
                <span id="raporCompDropLabel">Tüm Firmalar</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0">
                  <path d="M2 4l4 4 4-4" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </button>
              <div id="raporCompDropPanel" class="company-dropdown-panel" style="display:none;">
                <input type="text" id="raporCompDropSearch" class="company-dropdown-search" placeholder="Firma ara..."
                  oninput="filterRaporCompDropdown()" autocomplete="off">
                <ul id="raporCompDropList" class="company-dropdown-list"></ul>
              </div>
            </div>
            <input type="hidden" id="raporFilterCompany" value="">

            <input type="date" id="raporFilterDateStart" class="fatura-filter-input" title="Başlangıç tarihi"
              onchange="renderRaporPage()">
            <span style="color:#94a3b8; font-size:13px; flex-shrink:0;">—</span>
            <input type="date" id="raporFilterDateEnd" class="fatura-filter-input" title="Bitiş tarihi"
              onchange="renderRaporPage()">

            <div id="raporProdDropWrap" class="company-dropdown-wrap" style="width:180px; min-width:140px;">
              <button type="button" id="raporProdDropBtn" class="company-dropdown-btn"
                onclick="toggleRaporProdDropdown()">
                <span id="raporProdDropLabel">Tüm Ürünler</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0">
                  <path d="M2 4l4 4 4-4" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </button>
              <div id="raporProdDropPanel" class="company-dropdown-panel" style="display:none;">
                <input type="text" id="raporProdDropSearch" class="company-dropdown-search" placeholder="Ürün ara..."
                  oninput="filterRaporProdDropdown()" autocomplete="off">
                <ul id="raporProdDropList" class="company-dropdown-list"></ul>
              </div>
            </div>
            <input type="hidden" id="raporFilterProduct" value="">

            <button class="rapor-filter-clear" onclick="clearRaporFilters()" title="Filtreleri temizle">✕</button>
          </div>
        </div>

        <div class="rapor-body">
          <div id="raporKpis" class="rapor-kpis"></div>
          <div class="rapor-table-wrap">
            <table class="rapor-tbl">
              <thead id="raporThead"></thead>
              <tbody id="raporTbody"></tbody>
            </table>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="../js/utils.js?v=1"></script>
  <script src="../js/rapor.js?v=1"></script>

</body>

</html>
