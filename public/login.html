<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İnokas CRM — Giriş</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── LEFT: Login form ─────────────────────────────────── */
    .left {
      background: #020818;
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(37,99,235,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(99,102,241,0.15) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 72px;
      position: relative;
      overflow: hidden;
    }

    /* subtle grid pattern */
    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .left-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      background: #2563eb;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(37,99,235,0.8);
    }

    .brand-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    .brand-text span { color: #60a5fa; }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .login-sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 40px;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #1e293b;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: white;
      background: #0f172a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder { color: #334155; }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .error {
      display: none;
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.3);
      color: #f87171;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    }

    .btn-login:hover {
      background: #1d4ed8;
      box-shadow: 0 4px 24px rgba(37,99,235,0.6);
    }

    .btn-login:active { transform: scale(0.99); }
    .btn-login.loading { background: #1e40af; cursor: not-allowed; box-shadow: none; }

    /* ── RIGHT: Photo ─────────────────────────────────────── */
    .right {
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.85) contrast(1.05);
    }

    /* overlay gradient on left edge of photo for blending */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #020818 0%, transparent 20%);
      z-index: 1;
      pointer-events: none;
    }

    /* Quote overlay at bottom */
    .right-quote {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 48px 40px;
      background: linear-gradient(to top, rgba(2,8,24,0.95) 0%, transparent 100%);
    }

    .stars {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .star {
      font-size: 16px;
      animation: popIn 0.4s ease backwards;
    }

    .star:nth-child(1) { animation-delay: 0.2s; }
    .star:nth-child(2) { animation-delay: 0.3s; }
    .star:nth-child(3) { animation-delay: 0.4s; }
    .star:nth-child(4) { animation-delay: 0.5s; }
    .star:nth-child(5) { animation-delay: 0.6s; }

    @keyframes popIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0);      opacity: 1; }
    }

    .quote-text {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .quote-author {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>


  <!-- LEFT -->
  <div class="left">
    <div class="left-inner">

      <!-- İnokas CRM brand -->
      <div class="brand" style="margin-bottom:32px;">
        <div class="brand-dot"></div>
        <div class="brand-text">KUMANDA </div>
      </div>

      <!-- Form -->
      <div>
        <div class="login-title">Tekrar hoş geldiniz</div>
        <div class="login-sub">Hesabınıza giriş yapın</div>

        <div id="errorMsg" class="error">E-posta veya şifre hatalı.</div>

        <div class="form-group">
          <label>E-posta</label>
          <input type="email" id="email" placeholder="ornek@mail.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label>Şifre</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Giriş Yap →</button>
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <img src="assests/kumanda2.gif" alt="Erdem Gökalp">
  </div>

  <script>
    if (sessionStorage.getItem('inokas_token')) window.location.href = '/';
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent    = 'E-posta ve şifre zorunlu.';
        errorEl.style.display  = 'block';
        return;
      }

      btn.textContent = 'Giriş yapılıyor...';
      btn.classList.add('loading');

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data?.error || 'Giriş başarısız.');

        sessionStorage.setItem('inokas_token', data.token);
        btn.textContent = '✓ Giriş yapıldı';
        setTimeout(() => window.location.replace('/chat'), 600);


      } catch (err) {
        errorEl.textContent   = err.message;
        errorEl.style.display = 'block';
        btn.textContent       = 'Giriş Yap →';
        btn.classList.remove('loading');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>

</body>
</html>
