<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stok Hareketleri — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/auth/login.html';
  </script>
  <link rel="stylesheet" href="/shared/shared-filters.css?v=1">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/stok/css/stok-base.css?v=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <div class="page-area">

    <!-- Header -->
    <div class="page-header">
      <button class="sb-toggle-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
      <div>
        <p class="page-header-title">Stok Hareketleri</p>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">

      <!-- TOP ROW -->
      <div class="filter-row">

        <!-- Company tags -->
        <div class="filter-tags-wrap" id="companyTagsWrap" onclick="document.getElementById('companyTagInput').focus()">
          <div id="companyTags" class="filter-tags"></div>
          <input type="text" id="companyTagInput" class="filter-tags-input" placeholder="Firma ekle...">
          <div id="companyDropdown" class="filter-dropdown"></div>
        </div>

        <!-- Product tags -->
        <div class="filter-tags-wrap" id="productTagsWrap" onclick="document.getElementById('productTagInput').focus()">
          <div id="productTags" class="filter-tags"></div>
          <input type="text" id="productTagInput" class="filter-tags-input" placeholder="Ürün / SKU ekle...">
          <div id="productDropdown" class="filter-dropdown"></div>
        </div>

        <!-- Date range -->
        <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
          <input type="date" id="filterDateStart" class="filter-date">
          <span style="color:#475569; font-size:12px;">—</span>
          <input type="date" id="filterDateEnd" class="filter-date">
        </div>

        <!-- Direction -->
        <select id="filterDirection" class="filter-select" style="max-width:180px; flex:0 0 auto;">
          <option value="">Tüm Hareketler</option>
          <option value="INCOMING">▲ Giriş</option>
          <option value="OUTGOING">▼ Çıkış</option>
        </select>

        <!-- Buttons -->
        <div style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
          <button class="filter-btn-clear" onclick="clearAllFilters()" title="Temizle">
            <i class="ti ti-trash" style="font-size:14px;"></i>
          </button>
        </div>
      </div>

      <!-- ADVANCED TOGGLE -->
      <button class="filter-advanced-toggle" onclick="toggleAdvancedFilters()">
        <span id="advancedFiltersBtnText">
          <i class="ti ti-chevron-down" style="font-size:12px;"></i> Gelişmiş Filtreler
        </span>
        <span id="advancedFiltersBadge" style="display:none; background:#2563eb; color:white; border-radius:99px; padding:1px 7px; font-size:11px; font-weight:700; margin-left:4px;">!</span>
      </button>

      <!-- ADVANCED PANEL -->
      <div id="advancedFiltersPanel" class="filter-advanced-panel">
        <div class="filter-row" style="margin-top:10px;">

          <!-- Brand tags -->
          <div class="filter-tags-wrap" id="brandTagsWrap" onclick="document.getElementById('brandTagInput').focus()">
            <div id="brandTags" class="filter-tags"></div>
            <input type="text" id="brandTagInput" class="filter-tags-input" placeholder="Marka ekle...">
            <div id="brandDropdown" class="filter-dropdown"></div>
          </div>

          <!-- Category tags -->
          <div class="filter-tags-wrap" id="categoryTagsWrap" onclick="document.getElementById('categoryTagInput').focus()">
            <div id="categoryTags" class="filter-tags"></div>
            <input type="text" id="categoryTagInput" class="filter-tags-input" placeholder="Kategori ekle...">
            <div id="categoryDropdown" class="filter-dropdown"></div>
          </div>

          <!-- Model tags -->
          <div class="filter-tags-wrap" id="modelTagsWrap" onclick="document.getElementById('modelTagInput').focus()">
            <div id="modelTags" class="filter-tags"></div>
            <input type="text" id="modelTagInput" class="filter-tags-input" placeholder="Model ekle...">
            <div id="modelDropdown" class="filter-dropdown"></div>
          </div>

        </div>
      </div>

    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <p class="kpi-card-label">Ürün Sayısı</p>
        <p class="kpi-card-value" id="kpi-total">—</p>
      </div>
      <div class="kpi-card">
        <p class="kpi-card-label">Toplam Giriş</p>
        <p class="kpi-card-value success" id="kpi-in">—</p>
      </div>
      <div class="kpi-card">
        <p class="kpi-card-label">Toplam Çıkış</p>
        <p class="kpi-card-value danger" id="kpi-out">—</p>
      </div>
      <div class="kpi-card">
        <p class="kpi-card-label">Toplam Kayıt</p>
        <p class="kpi-card-value primary" id="kpi-amount">—</p>
      </div>
    </div>

    <!-- Table -->
    <div class="table-area">
      <table class="data-table">
        <thead>
          <tr>
            <th>Ürün Adı</th>
            <th>SKU</th>
            <th>Marka</th>
            <th>Kategori</th>
            <th class="text-right">Toplam Giriş</th>
            <th class="text-right">Toplam Çıkış</th>
            <th>Son Hareket</th>
          </tr>
        </thead>
        <tbody id="movementsTableBody"></tbody>
      </table>
      <div id="movementsEmpty" class="empty-state">Hareket kaydı bulunamadı.</div>
    </div>

    <!-- Analiz Bar -->
    <div class="analiz-bar" onclick="toggleAnaliz()">
      <div class="analiz-bar-left">
        <i class="ti ti-chart-bar" style="font-size:16px;"></i>
        <span>Analiz</span>
      </div>
      <i class="ti ti-chevron-down analiz-chevron" id="analizChevron"></i>
    </div>

    <!-- Charts Panel -->
    <div class="analiz-panel" id="analizPanel">
      <div class="analiz-grid" id="analizGrid"></div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="/shared/auth-interceptor.js"></script>  <!-- no defer -->
<script src="/shared/sidebar.js" defer></script>      <!-- defer is fine -->
<script src="/stok/js/utils.js?v=20260523-dropdown-limit"></script>
<script src="/stok/js/analytics.js"></script>
<script src="/stok/js/stok-hareketleri.js?v=20260523-brand-fix"></script>
</body>
</html>
