<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün Hareketleri — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/login.html';
  </script>
  <link rel="stylesheet" href="/shared-filters.css?v=1">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/sidebar.css">
  <link rel="stylesheet" href="/stok/css/stok-base.css?v=1">
  <link rel="stylesheet" href="/stok/css/urun-hareketleri.css?v=1">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <div class="page-area">

    <!-- Header -->
    <div class="page-header">
      <button class="sb-toggle-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
      <div style="display:flex; align-items:center; gap:10px;">
        <a href="/stok/pages/stok-hareketleri.html" class="back-btn" title="Geri">
          <i class="ti ti-arrow-left"></i>
        </a>
        <div>
          <p class="page-header-title" id="pageProductName">Yükleniyor...</p>
          <p class="page-header-sub" id="pageProductSku"></p>
        </div>
      </div>
    </div>

    <!-- Mini Stats -->
    <div class="uh-stats-row" id="uhStatsRow">
      <div class="uh-stat">
        <span class="uh-stat-label">Toplam Giriş</span>
        <span class="uh-stat-value text-success" id="statIn">—</span>
      </div>
      <div class="uh-stat">
        <span class="uh-stat-label">Toplam Çıkış</span>
        <span class="uh-stat-value text-danger" id="statOut">—</span>
      </div>
      <div class="uh-stat">
        <span class="uh-stat-label">Net Stok</span>
        <span class="uh-stat-value" id="statNet">—</span>
      </div>
      <div class="uh-stat">
        <span class="uh-stat-label">Firma Sayısı</span>
        <span class="uh-stat-value" id="statCompanies">—</span>
      </div>
      <div class="uh-stat">
        <span class="uh-stat-label">Toplam Kayıt</span>
        <span class="uh-stat-value" id="statTotal">—</span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-row">

        <!-- Company tag filter -->
        <div class="filter-tags-wrap" id="companyTagsWrap" onclick="document.getElementById('companyTagInput').focus()">
          <div id="companyTags" class="filter-tags"></div>
          <input type="text" id="companyTagInput" class="filter-tags-input" placeholder="Firma ekle...">
          <div id="companyDropdown" class="filter-dropdown"></div>
        </div>

        <!-- Direction -->
        <select id="filterDirection" class="filter-select" style="max-width:180px; flex:0 0 auto;">
          <option value="">Tüm Hareketler</option>
          <option value="INCOMING">▲ Giriş</option>
          <option value="OUTGOING">▼ Çıkış</option>
        </select>

        <!-- Date range -->
        <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
          <input type="date" id="filterDateStart" class="filter-date">
          <span style="color:#475569; font-size:12px;">—</span>
          <input type="date" id="filterDateEnd" class="filter-date">
        </div>

        <!-- Clear -->
        <button class="filter-btn-clear" onclick="clearFilters()" title="Temizle">
          <i class="ti ti-trash" style="font-size:14px;"></i>
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-area">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:100px;">Tarih</th>
            <th style="width:80px;">İşlem</th>
            <th style="width:160px;">Fatura No</th>
            <th>Firma</th>
            <th style="width:80px; text-align:right;">Miktar</th>
            <th style="width:120px; text-align:right;">Birim Fiyat</th>
            <th style="width:70px;">Döviz</th>
            <th style="width:50px;">PDF</th>
          </tr>
        </thead>
        <tbody id="uhTableBody"></tbody>
      </table>
      <div id="uhEmpty" class="empty-state">Hareket bulunamadı.</div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="/sidebar.js" defer></script>
<script src="/stok/js/utils.js"></script>
<script src="/stok/js/urun-hareketleri.js"></script>
</body>
</html>
