<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürünler — İnokas CRM</title>
  <script>
    if (!sessionStorage.getItem('inokas_token')) window.location.href = '/login.html';
  </script>
  <link rel="stylesheet" href="/shared/shared-filters.css?v=1">
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/shared/sidebar.css">
  <link rel="stylesheet" href="/stok/css/stok-base.css?v=1">
  <link rel="stylesheet" href="/stok/css/urunler.css?v=2">
</head>

<body>
  <div class="app-shell">
    <div id="sidebar-container"></div>

    <div class="page-area">

      <!-- Header -->
      <div class="page-header">
        <button class="sb-toggle-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
        <div>
          <p class="page-header-title">Ürünler</p>
          <p class="page-header-sub" id="urunler-count">Yükleniyor...</p>
        </div>
        <div style="margin-left:auto;">
          <button class="btn-primary" onclick="openAddModal()"
            style="display:flex; align-items:center; gap:6px; font-size:13px;">
            <i class="ti ti-plus"></i> Ürün Ekle
          </button>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">

        <!-- MAIN ROW -->
        <div class="filter-row">

          <!-- Text search -->
          <div class="filter-tags-wrap" style="flex:2; min-width:160px;"
            onclick="document.getElementById('urunSearch').focus()">
            <input type="text" id="urunSearch" class="filter-tags-input" placeholder="Ürün adı, SKU ara...">
          </div>

          <!-- Brand tags -->
          <div class="filter-tags-wrap" id="brandTagsWrap" onclick="document.getElementById('brandTagInput').focus()">
            <div id="brandTags" class="filter-tags"></div>
            <input type="text" id="brandTagInput" class="filter-tags-input" placeholder="Marka ekle...">
            <div id="brandDropdown" class="filter-dropdown"></div>
          </div>

          <!-- Category tags -->
          <div class="filter-tags-wrap" id="categoryTagsWrap"
            onclick="document.getElementById('categoryTagInput').focus()">
            <div id="categoryTags" class="filter-tags"></div>
            <input type="text" id="categoryTagInput" class="filter-tags-input" placeholder="Kategori ekle...">
            <div id="categoryDropdown" class="filter-dropdown"></div>
          </div>

          <!-- Model tags -->
          <div class="filter-tags-wrap" id="modelTagsWrap" onclick="document.getElementById('modelTagInput').focus()">
            <div id="modelTags" class="filter-tags"></div>
            <input type="text" id="modelTagInput" class="filter-tags-input" placeholder="Model ekle...">
            <div id="modelDropdown" class="filter-dropdown"></div>
          </div>

          <!-- Buttons -->
          <div style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
            <button class="filter-btn-apply" onclick="applyFilters()">
              <i class="ti ti-filter" style="font-size:13px;"></i>Uygula
            </button>
            <button class="filter-btn-clear" onclick="clearFilters()" title="Temizle">
              <i class="ti ti-trash" style="font-size:14px;"></i>
            </button>
          </div>

        </div>

        <!-- ADVANCED TOGGLE -->
        <button class="filter-advanced-toggle" onclick="toggleAdvancedFilters()">
          <span id="advancedFiltersBtnText">
            <i class="ti ti-chevron-down" style="font-size:12px;"></i> Gelişmiş Filtreler
          </span>
          <span id="advancedFiltersBadge"
            style="display:none; background:#2563eb; color:white; border-radius:99px; padding:1px 7px; font-size:11px; font-weight:700; margin-left:4px;">!</span>
        </button>

        <!-- ADVANCED PANEL -->
        <div id="advancedFiltersPanel" class="filter-advanced-panel">
          <div class="filter-row" style="margin-top:10px; align-items:center; flex-wrap:wrap; gap:10px;">

            <!-- Currency tags -->
            <div class="filter-tags-wrap" id="currencyTagsWrap" style="max-width:160px;"
              onclick="document.getElementById('currencyTagInput').focus()">
              <div id="currencyTags" class="filter-tags"></div>
              <input type="text" id="currencyTagInput" class="filter-tags-input" placeholder="Para birimi...">
              <div id="currencyDropdown" class="filter-dropdown"></div>
            </div>

            <!-- Depoda olanlar toggle -->
            <label class="dmo-toggle-label">
              <input type="checkbox" id="filterInStockOnly" onchange="updateAdvancedBadge(); applyFilters();">
              <span style="font-size:12px; background:#dcfce7; color:#166534; font-weight:700; padding:2px 8px; border-radius:20px; border:1px solid #bbf7d0;">📦 Depoda</span>
            </label>

            <!-- DMO only toggle -->
            <label class="dmo-toggle-label">
              <input type="checkbox" id="filterDmoOnly" onchange="updateAdvancedBadge(); applyFilters();">
              <span class="badge-dmo" style="font-size:12px;">DMO</span>
            </label>

            <!-- Eksik özellik toggle -->
            <label class="dmo-toggle-label" id="filterMissingAttrsWrap" style="display:none;">
              <input type="checkbox" id="filterMissingAttrs" onchange="onAttrFilterChange();">
              <span style="font-size:12px; background:#fef3c7; color:#92400e; font-weight:700; padding:2px 8px; border-radius:20px; border:1px solid #fde68a;">⚠ Eksik Özellik</span>
            </label>

          </div>

          <!-- Dinamik kategori özellikleri -->
          <div id="dynamic-attr-filters" style="display:none; margin-top:10px; display:none;"></div>

        </div>

      </div>

      <!-- KPI Cards -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">
        <div class="kpi-card">
          <p class="kpi-card-label">Toplam Ürün</p>
          <p class="kpi-card-value" id="kpi-total">—</p>
        </div>
        <div class="kpi-card">
          <p class="kpi-card-label">Kategori</p>
          <p class="kpi-card-value primary" id="kpi-categories">—</p>
        </div>
        <div class="kpi-card">
          <p class="kpi-card-label">Marka</p>
          <p class="kpi-card-value" id="kpi-brands">—</p>
        </div>
        <div class="kpi-card">
          <p class="kpi-card-label">Model</p>
          <p class="kpi-card-value" id="kpi-models">—</p>
        </div>
      </div>

      <!-- Table -->
      <div class="table-area">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:30%;">Ürün Adı</th>
              <th style="width:15%;">SKU / Kod</th>
              <th style="width:12%;">Marka</th>
              <th style="width:12%;">Kategori</th>
              <th style="width:12%;">Model</th>
              <th style="width:12%; text-align:right;">Mevcut Miktar</th>
              <th style="width:19%; text-align:right;">Son Alış Fiyatı</th>
            </tr>
          </thead>
          <tbody id="urunlerTableBody"></tbody>
        </table>
        <div id="urunlerEmpty" class="empty-state">Ürün bulunamadı.</div>
      </div>

    </div>
  </div>

  <!-- ── Product Edit/Add Modal ── -->
  <div id="productModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Ürün Detayı</h2>
          <div class="modal-header-sub" id="modalSubTitle"></div>
        </div>
        <button class="modal-close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-body">

        <!-- Temel Bilgiler -->
        <div class="modal-section">
          <div class="modal-section-title">Temel Bilgiler</div>
          <div class="modal-grid">
            <div class="modal-field modal-field--full">
              <label>Ürün Adı <span class="req">*</span></label>
              <input type="text" id="pf-product_name">
            </div>
            <div class="modal-field">
              <label>Ürün Kodu / SKU <span class="req">*</span></label>
              <input type="text" id="pf-product_code">
            </div>
            <div class="modal-field">
              <label>Marka</label>
              <select id="pf-brand"></select>
            </div>
            <div class="modal-field">
              <label style="display:flex; align-items:center; justify-content:space-between;">
                <span>Kategori</span>
                <label style="display:flex; align-items:center; gap:5px; font-weight:600; font-size:11px; color:#475569; cursor:pointer; text-transform:none; letter-spacing:0;">
                  <input type="checkbox" id="pf-is-internal" onchange="onInternalToggle(this.checked)" style="width:auto; accent-color:#2563eb;">
                  Ofis İçi
                </label>
              </label>
              <div id="pf-cat-wrap" style="position:relative;">
                <input type="text" id="pf-category" placeholder="Kategori yaz veya seç..."
                  autocomplete="off"
                  style="width:100%; padding:7px 10px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; font-family:inherit; color:#0f172a; background:#fff; outline:none; box-sizing:border-box;"
                  oninput="onCatInput(this.value)"
                  onfocus="onCatInput(this.value)">
                <div id="pf-cat-dropdown"
                  style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.1); z-index:2000; max-height:200px; overflow-y:auto;"></div>
              </div>
              <div id="pf-internal-cat-wrap" style="display:none; position:relative;">
                <input type="text" id="pf-internal-cat-input" placeholder="Kategori yaz veya seç..."
                  autocomplete="off"
                  style="width:100%; padding:7px 10px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; font-family:inherit; color:#0f172a; background:#fff; outline:none; box-sizing:border-box;"
                  oninput="onInternalCatInput(this.value)"
                  onfocus="onInternalCatInput(this.value)">
                <div id="pf-internal-cat-dropdown"
                  style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.1); z-index:2000; max-height:200px; overflow-y:auto;"></div>
              </div>
            </div>
            <div class="modal-field">
              <label>Model</label>
              <input type="text" id="pf-model">
            </div>
          </div>
        </div>

        <!-- Kategori Özellikleri -->
        <div class="modal-section" id="dynamic-attrs-section" style="display:none;">
          <div class="modal-section-title">Kategori Özellikleri</div>
          <div class="modal-grid" id="dynamic-attrs-grid"></div>
        </div>

        <!-- Fiyatlar -->
        <div class="modal-section">
          <div class="modal-section-title">Fiyatlar</div>
          <div class="modal-grid">
            <div class="modal-field">
              <label>Maliyet (USD)</label>
              <input type="number" step="0.01" id="pf-maliyet_usd">
            </div>
            <div class="modal-field">
              <label>Sözleşme Fiyatı (EUR)</label>
              <input type="number" step="0.01" id="pf-sozlesme_fiyat_eur">
            </div>
            <div class="modal-field">
              <label>Son Alış Fiyatı</label>
              <input type="number" step="0.01" id="pf-last_purchase_price_cur">
            </div>
            <div class="modal-field">
              <label>Para Birimi</label>
              <input type="text" id="pf-last_purchase_currency" placeholder="USD / EUR / TRY">
            </div>
            <div class="modal-field">
              <label>Son Alış Kuru</label>
              <input type="number" step="0.0001" id="pf-last_purchase_rate">
            </div>
            <div class="modal-field">
              <label>Son Alış (TL)</label>
              <input type="number" step="0.01" id="pf-last_purchase_price_tl">
            </div>
            <div class="modal-field">
              <label>Ort. Alış (TL)</label>
              <input type="number" step="0.01" id="pf-avg_purchase_price_tl">
            </div>
          </div>
        </div>

        <!-- DMO -->
        <div class="modal-section">
          <div class="modal-section-title">DMO Bilgileri</div>
          <div class="modal-grid">
            <div class="modal-field">
              <label>DMO Kodu</label>
              <input type="text" id="pf-dmo_code">
            </div>
            <div class="modal-field">
              <label>DMO Fiyatı (TRY)</label>
              <input type="number" step="0.01" id="pf-dmo_fiyat_try">
            </div>
            <div class="modal-field modal-field--full">
              <label>DMO URL</label>
              <input type="text" id="pf-dmo_url" placeholder="https://www.dmo.gov.tr/...">
            </div>
            <div class="modal-field">
              <label>Hediye Miktarı</label>
              <input type="number" step="1" id="pf-gift_quantity">
            </div>
          </div>
        </div>

        <!-- Sistem -->
        <div class="modal-section">
          <div class="modal-section-title">Sistem Bilgileri</div>
          <div class="modal-grid">
            <div class="modal-field">
              <label>Oluşturulma</label>
              <input type="text" id="pf-created_at" readonly class="readonly-field">
            </div>
            <div class="modal-field">
              <label>Son Güncelleme</label>
              <input type="text" id="pf-updated_at" readonly class="readonly-field">
            </div>
            <div class="modal-field">
              <label>DMO Fiyat Güncelleme</label>
              <input type="text" id="pf-dmo_fiyat_updated" readonly class="readonly-field">
            </div>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <span id="modalMsg" class="modal-msg"></span>
        <button class="btn-secondary" onclick="closeModal()">İptal</button>
        <button class="btn-primary" id="modalSaveBtn" onclick="saveProduct()">Kaydet</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/shared/sidebar.js" defer></script>
  <script src="/stok/js/utils.js"></script>
  <script src="/stok/js/urunler.js?v=20260519-cat-autocomplete"></script>
</body>

</html>
